version: "3.9"
services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: always
    env_file: .env
    volumes:
      - rag_index:/app/rag/index
      - ./data:/app/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  rag_index:
